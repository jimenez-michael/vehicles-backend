type Vehicle {
  id: Int!
  vehicleNumber: String!
  make: String!
  model: String!
  year: Int!
  licensePlate: String!
  program: String!
  subProgram: String
  municipality: String
  status: String!
  currentMileage: Float!
  createdBy: String
  updatedBy: String
  createdAt: DateTime
  updatedAt: DateTime
}

input CreateVehicleInput {
  vehicleNumber: String!
  make: String!
  model: String!
  year: Int!
  licensePlate: String!
  program: String!
  subProgram: String
  municipality: String
  currentMileage: Float
}

input UpdateVehicleInput {
  vehicleNumber: String
  make: String
  model: String
  year: Int
  licensePlate: String
  program: String
  subProgram: String
  municipality: String
  currentMileage: Float
  status: String
}

input VehiclesPageInput {
  page: Int = 1
  pageSize: Int = 25
  search: String
  status: String
  sortBy: String = "vehicleNumber"
  sortDir: String = "asc"
}

type VehiclesPage {
  items: [Vehicle!]!
  total: Int!
  page: Int!
  pageSize: Int!
  hasMore: Boolean!
}

extend type Query {
  vehicle(id: ID!): Vehicle
  vehicleByPlate(licensePlate: String!): Vehicle
  vehicles: [Vehicle]!
  vehiclesPage(input: VehiclesPageInput): VehiclesPage!
}

extend type Mutation {
  createVehicle(input: CreateVehicleInput!): Vehicle!
  updateVehicle(id: ID!, input: UpdateVehicleInput!): Vehicle!
  deleteVehicle(id: ID!): Vehicle!
}
