type AppRole {
  id: String!
  displayName: String!
  description: String
  value: String!
}

type AppRoleAssignment {
  id: Int!
  assignmentId: String!
  principalId: String!
  displayName: String!
  email: String
  appRoleId: String!
  roleName: String
  createdAt: DateTime
}

type DirectoryUser {
  id: String!
  displayName: String!
  mail: String
  userPrincipalName: String!
  jobTitle: String
}

extend type Query {
  appRoleAssignments: [AppRoleAssignment]!
  appRoles: [AppRole]!
  searchDirectoryUsers(search: String!): [DirectoryUser]!
  usersPage(input: UsersPageInput): UsersPage!
}

type GroupedUser {
  principalId: String!
  displayName: String!
  email: String
  assignments: [AppRoleAssignment!]!
}

input UsersPageInput {
  page: Int = 1
  pageSize: Int = 25
  search: String
  sortBy: String = "displayName"
  sortDir: String = "asc"
}

type UsersPage {
  items: [GroupedUser!]!
  total: Int!
  page: Int!
  pageSize: Int!
  hasMore: Boolean!
}

extend type Mutation {
  assignAppRole(principalId: String!, appRoleId: String!, displayName: String!, email: String): AppRoleAssignment!
  removeAppRoleAssignment(id: Int!): Boolean!
  syncAppRoleAssignments: [AppRoleAssignment]!
}
