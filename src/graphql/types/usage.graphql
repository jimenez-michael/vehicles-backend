type VehicleUsage {
  id: Int!
  vehicleId: Int!
  vehicle: Vehicle
  status: String!
  # Pickup
  userId: String!
  userName: String!
  userEmail: String!
  pickupDate: DateTime!
  pickupMileage: Float!
  visibleDamage: Boolean!
  visibleDamageDesc: String
  brokenWindows: Boolean!
  brokenWindowsDesc: String
  lightsWorking: Boolean!
  lightsWorkingDesc: String
  mirrorsOk: Boolean!
  mirrorsOkDesc: String
  tiresOk: Boolean!
  tiresOkDesc: String
  dashboardAlerts: Boolean
  dashboardAlertDetails: String
  pickupObservations: String
  # Return
  returnDate: DateTime
  returnMileage: Float
  incidentOccurred: Boolean
  incidentDescription: String
  newDamage: Boolean
  newDamageDesc: String
  interiorConditionOk: Boolean
  interiorConditionDesc: String
  properlyParked: Boolean
  properlyParkedDesc: String
  returnObservations: String
  # Timestamps
  createdAt: DateTime
  updatedAt: DateTime
}

type UsageStats {
  totalTrips: Int!
  totalMileage: Float!
  daysWithoutIncident: Int!
  lastIncidentDate: DateTime
}

type MileageByMonth {
  month: String!
  mileage: Float!
}

type TripsByVehicle {
  vehicleNumber: String!
  trips: Int!
}

type IncidentsByMonth {
  month: String!
  incidents: Int!
}

type DailyActivity {
  date: String!
  trips: Int!
  incidents: Int!
}

type FleetStats {
  totalVehicles: Int!
  activeVehicles: Int!
  totalTrips: Int!
  totalMileage: Float!
  totalIncidents: Int!
  daysWithoutIncident: Int!
  mileageByMonth: [MileageByMonth]!
  tripsByVehicle: [TripsByVehicle]!
  incidentsByMonth: [IncidentsByMonth]!
  dailyActivity: [DailyActivity!]!
  recentRecords: [VehicleUsage!]!
  tripsThisMonth: Int!
  tripsLastMonth: Int!
  incidentsThisMonth: Int!
  incidentsLastMonth: Int!
}

input CreatePickupInput {
  vehicleId: ID!
  userId: String!
  userName: String!
  userEmail: String!
  pickupDate: DateTime!
  pickupMileage: Float!
  visibleDamage: Boolean!
  visibleDamageDesc: String
  brokenWindows: Boolean!
  brokenWindowsDesc: String
  lightsWorking: Boolean!
  lightsWorkingDesc: String
  mirrorsOk: Boolean!
  mirrorsOkDesc: String
  tiresOk: Boolean!
  tiresOkDesc: String
  dashboardAlerts: Boolean
  dashboardAlertDetails: String
  pickupObservations: String
}

input CompleteReturnInput {
  returnDate: DateTime!
  returnMileage: Float!
  incidentOccurred: Boolean!
  incidentDescription: String
  newDamage: Boolean!
  newDamageDesc: String
  interiorConditionOk: Boolean!
  interiorConditionDesc: String
  properlyParked: Boolean!
  properlyParkedDesc: String
  returnObservations: String
}

extend type Query {
  usageRecord(id: ID!): VehicleUsage
  myUsageRecords: [VehicleUsage]!
  allUsageRecords: [VehicleUsage]!
  myActiveTrips: [VehicleUsage]!
  activeUsageByVehicle(vehicleId: ID!): VehicleUsage
  usageByVehicle(vehicleId: ID!): [VehicleUsage]!
  usageStats: UsageStats!
  fleetStats: FleetStats!
}

input UpdateUsageRecordInput {
  pickupDate: DateTime
  pickupMileage: Float
  returnDate: DateTime
  returnMileage: Float
  incidentOccurred: Boolean
  incidentDescription: String
  newDamage: Boolean
  newDamageDesc: String
  interiorConditionOk: Boolean
  interiorConditionDesc: String
  properlyParked: Boolean
  properlyParkedDesc: String
  returnObservations: String
  pickupObservations: String
}

extend type Mutation {
  createPickup(input: CreatePickupInput!): VehicleUsage!
  completeReturn(id: ID!, input: CompleteReturnInput!): VehicleUsage!
  forceCloseUsage(id: ID!): VehicleUsage!
  updateUsageRecord(id: ID!, input: UpdateUsageRecordInput!): VehicleUsage!
  deleteUsageRecord(id: ID!): VehicleUsage!
}
