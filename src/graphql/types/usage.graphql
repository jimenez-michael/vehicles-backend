type VehicleUsage {
  id: Int!
  vehicleId: Int!
  vehicle: Vehicle
  status: String!
  # Pickup
  userId: String!
  userName: String!
  userEmail: String!
  pickupDate: DateTime!
  pickupMileage: Float!
  gasLevel: String!
  interiorCleanliness: String!
  exteriorCleanliness: String!
  visibleDamage: Boolean!
  visibleDamageDesc: String
  brokenWindows: Boolean!
  brokenWindowsDesc: String
  lightsWorking: Boolean!
  lightsWorkingDesc: String
  mirrorsOk: Boolean!
  mirrorsOkDesc: String
  tiresOk: Boolean!
  tiresOkDesc: String
  dashboardAlerts: Boolean
  dashboardAlertDetails: String
  pickupObservations: String
  # Return
  returnDate: DateTime
  returnMileage: Float
  gasFilledUp: Boolean
  returnInteriorCleanliness: String
  returnExteriorCleanliness: String
  incidentOccurred: Boolean
  incidentDescription: String
  policeReportNumber: String
  trustDriverName: String
  thirdPartyName: String
  thirdPartyAddress: String
  thirdPartyPhone: String
  thirdPartyVehicleModel: String
  thirdPartyVehicleYear: Int
  newDamage: Boolean
  newDamageDesc: String
  interiorConditionOk: Boolean
  interiorConditionDesc: String
  properlyParked: Boolean
  properlyParkedDesc: String
  returnObservations: String
  # Attachments
  attachments: [IncidentAttachment!]!
  # Driver's license on file for the user that owns this record
  driverLicense: UserDriverLicense
  # Timestamps
  createdAt: DateTime
  updatedAt: DateTime
}

enum IncidentAttachmentCategory {
  ACCIDENT_FORM
  TRUST_VEHICLE_LICENSE
  THIRD_PARTY_LICENSE
  TRUST_VEHICLE_PHOTO
  IMPACT_AREA_PHOTO
  OTHER
}

type IncidentAttachment {
  id: ID!
  usageId: Int!
  category: IncidentAttachmentCategory!
  originalFileName: String!
  contentType: String!
  sizeBytes: Int!
  uploadedById: String!
  uploadedByName: String
  uploadedByEmail: String
  uploadedAt: DateTime!
  downloadUrl: String!
}

type AttachmentUploadTicket {
  uploadUrl: String!
  blobName: String!
  containerName: String!
  attachmentId: ID
  expiresAt: DateTime!
}

type UsageStats {
  totalTrips: Int!
  totalMileage: Float!
  daysWithoutIncident: Int!
  lastIncidentDate: DateTime
}

type MileageByMonth {
  month: String!
  mileage: Float!
}

type TripsByVehicle {
  vehicleNumber: String!
  trips: Int!
}

type IncidentsByMonth {
  month: String!
  incidents: Int!
}

type DailyActivity {
  date: String!
  trips: Int!
  incidents: Int!
}

type FleetStats {
  totalVehicles: Int!
  activeVehicles: Int!
  totalTrips: Int!
  totalMileage: Float!
  totalIncidents: Int!
  daysWithoutIncident: Int!
  mileageByMonth: [MileageByMonth]!
  tripsByVehicle: [TripsByVehicle]!
  incidentsByMonth: [IncidentsByMonth]!
  dailyActivity: [DailyActivity!]!
  recentRecords: [VehicleUsage!]!
  tripsThisMonth: Int!
  tripsLastMonth: Int!
  incidentsThisMonth: Int!
  incidentsLastMonth: Int!
}

input CreatePickupInput {
  vehicleId: ID!
  userId: String!
  userName: String!
  userEmail: String!
  pickupDate: DateTime!
  pickupMileage: Float!
  gasLevel: String!
  interiorCleanliness: String!
  exteriorCleanliness: String!
  visibleDamage: Boolean!
  visibleDamageDesc: String
  brokenWindows: Boolean!
  brokenWindowsDesc: String
  lightsWorking: Boolean!
  lightsWorkingDesc: String
  mirrorsOk: Boolean!
  mirrorsOkDesc: String
  tiresOk: Boolean!
  tiresOkDesc: String
  dashboardAlerts: Boolean
  dashboardAlertDetails: String
  pickupObservations: String
}

input CompleteReturnInput {
  returnDate: DateTime!
  returnMileage: Float!
  gasFilledUp: Boolean
  returnInteriorCleanliness: String
  returnExteriorCleanliness: String
  incidentOccurred: Boolean!
  incidentDescription: String
  newDamage: Boolean!
  newDamageDesc: String
  interiorConditionOk: Boolean!
  interiorConditionDesc: String
  properlyParked: Boolean!
  properlyParkedDesc: String
  returnObservations: String
}

input UsageRecordsPageInput {
  page: Int = 1
  pageSize: Int = 25
  search: String
  status: String
  scope: String = "all"
  incidentsOnly: Boolean
  vehicleId: Int
  sortBy: String = "pickupDate"
  sortDir: String = "desc"
}

type UsageRecordsPage {
  items: [VehicleUsage!]!
  total: Int!
  page: Int!
  pageSize: Int!
  hasMore: Boolean!
}

extend type Query {
  usageRecord(id: ID!): VehicleUsage
  myUsageRecords: [VehicleUsage]!
  allUsageRecords: [VehicleUsage]!
  usageRecordsPage(input: UsageRecordsPageInput): UsageRecordsPage!
  myActiveTrips: [VehicleUsage]!
  activeUsageByVehicle(vehicleId: ID!): VehicleUsage
  usageByVehicle(vehicleId: ID!): [VehicleUsage]!
  usageStats: UsageStats!
  fleetStats: FleetStats!
  incidentReport(usageId: ID!): VehicleUsage
}

input UpdateUsageRecordInput {
  pickupDate: DateTime
  pickupMileage: Float
  gasLevel: String
  interiorCleanliness: String
  exteriorCleanliness: String
  returnDate: DateTime
  returnMileage: Float
  gasFilledUp: Boolean
  returnInteriorCleanliness: String
  returnExteriorCleanliness: String
  incidentOccurred: Boolean
  incidentDescription: String
  newDamage: Boolean
  newDamageDesc: String
  interiorConditionOk: Boolean
  interiorConditionDesc: String
  properlyParked: Boolean
  properlyParkedDesc: String
  returnObservations: String
  pickupObservations: String
}

input UpdateIncidentReportInput {
  incidentOccurred: Boolean
  incidentDescription: String
  policeReportNumber: String
  trustDriverName: String
  thirdPartyName: String
  thirdPartyAddress: String
  thirdPartyPhone: String
  thirdPartyVehicleModel: String
  thirdPartyVehicleYear: Int
  newDamage: Boolean
  newDamageDesc: String
}

extend type Mutation {
  createPickup(input: CreatePickupInput!): VehicleUsage!
  completeReturn(id: ID!, input: CompleteReturnInput!): VehicleUsage!
  forceCloseUsage(id: ID!): VehicleUsage!
  updateUsageRecord(id: ID!, input: UpdateUsageRecordInput!): VehicleUsage!
  deleteUsageRecord(id: ID!): VehicleUsage!
  updateIncidentReport(usageId: ID!, input: UpdateIncidentReportInput!): VehicleUsage!
  requestIncidentAttachmentUpload(
    usageId: ID!
    category: IncidentAttachmentCategory!
    originalFileName: String!
    contentType: String!
    sizeBytes: Int!
  ): AttachmentUploadTicket!
  confirmIncidentAttachmentUpload(
    usageId: ID!
    blobName: String!
    containerName: String!
    category: IncidentAttachmentCategory!
    originalFileName: String!
    contentType: String!
    sizeBytes: Int!
  ): IncidentAttachment!
  deleteIncidentAttachment(id: ID!): Boolean!
}
