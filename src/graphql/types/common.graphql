type Me {
  id: String
  name: String
  email: String
  roles: [String]
}

type Query {
  me: Me

  # Reservations
  myReservations: [Reservation!]!
  allReservations: [Reservation!]!
  reservation(id: ID!): Reservation
  reservationsByVehicle(vehicleId: ID!, startDate: String, endDate: String): [Reservation!]!
  reservationsPage(input: ReservationsPageInput): ReservationsPage!
  pendingApprovals: [Reservation!]!
}

type Mutation {
  _empty: String

  # Reservations
  createReservation(input: CreateReservationInput!): Reservation!
  updateReservation(id: ID!, input: UpdateReservationInput!): Reservation!
  cancelReservation(id: ID!): Reservation!
  deleteReservation(id: ID!): Reservation!
  decideReservationApproval(id: ID!, input: ApprovalDecisionInput!): Reservation!
}
