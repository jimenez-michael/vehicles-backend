type ReservationVehicle {
  id: Int!
  vehicleNumber: String!
  make: String!
  model: String!
  year: Int!
  licensePlate: String!
  program: String!
  status: String!
}

type Reservation {
  id: Int!
  vehicleId: Int!
  vehicle: ReservationVehicle!
  userId: String!
  userName: String!
  userEmail: String!
  startDate: DateTime!
  endDate: DateTime!
  purpose: String
  notes: String
  status: String!
  isOvernight: Boolean!
  overnightDetails: String
  approvedByUserId: String
  approvedByName: String
  approvedByEmail: String
  approvalDecisionAt: DateTime
  approvalDecisionNotes: String
  createdBy: String
  updatedBy: String
  createdAt: DateTime!
  updatedAt: DateTime!
}

input CreateReservationInput {
  vehicleId: Int!
  startDate: DateTime!
  endDate: DateTime!
  purpose: String
  notes: String
  isOvernight: Boolean
  overnightDetails: String
}

input UpdateReservationInput {
  startDate: DateTime
  endDate: DateTime
  purpose: String
  notes: String
  isOvernight: Boolean
  overnightDetails: String
}

input ApprovalDecisionInput {
  decision: String!
  notes: String
}

input ReservationsPageInput {
  page: Int = 1
  pageSize: Int = 25
  search: String
  status: String
  scope: String = "all"
  sortBy: String = "startDate"
  sortDir: String = "desc"
}

type ReservationsPage {
  items: [Reservation!]!
  total: Int!
  page: Int!
  pageSize: Int!
  hasMore: Boolean!
}
